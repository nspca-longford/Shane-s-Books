<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Manuscripts — Shane J. Cox</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0f172a; --surface:#1e293b; --surface-2:#273548; --surface-3:#334155;
    --border:#2c3a4f; --text:#e2e8f0; --dim:#94a3b8; --faint:#64748b;
    --lime:#E0A53B; --lime-ink:#2a1f06;
    --paper:#faf8f2; --ink:#23262e;
    --amber:#f0b84a; --blue:#6fa8dc; --green:#7fc77f; --rose:#e08ab0; --red:#e2616b;
    --radius:14px; --radius-sm:9px;
    --shadow:0 10px 30px -12px rgba(0,0,0,.55);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:'Inter',system-ui,sans-serif;
    background:radial-gradient(1200px 700px at 80% -10%,rgba(224,165,59,.06),transparent 60%),var(--bg);
    color:var(--text);-webkit-font-smoothing:antialiased;line-height:1.5;
  }
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input,textarea,select{font-family:inherit;color:inherit}
  ::selection{background:rgba(224,165,59,.3)}

  /* screens */
  .screen{display:none;min-height:100vh;flex-direction:column}
  .screen.active{display:flex}

  /* top bar */
  .topbar{position:sticky;top:0;z-index:20;display:flex;align-items:center;gap:14px;
    padding:14px 20px;background:rgba(15,23,42,.82);backdrop-filter:blur(14px);
    border-bottom:1px solid var(--border);padding-top:max(14px,env(safe-area-inset-top))}
  .brand{display:flex;align-items:center;gap:10px;font-weight:800;letter-spacing:-.02em;font-size:18px}
  .brand .dot{width:11px;height:11px;border-radius:3px;background:var(--lime);box-shadow:0 0 14px var(--lime)}
  .brand small{font-weight:500;color:var(--dim);font-size:12px;letter-spacing:0}
  .spacer{flex:1}

  .btn{display:inline-flex;align-items:center;gap:7px;padding:9px 15px;border-radius:var(--radius-sm);
    font-weight:600;font-size:14px;background:var(--surface-2);color:var(--text);
    border:1px solid var(--border);transition:.15s}
  .btn:hover{background:var(--surface-3)}
  .btn.primary{background:var(--lime);color:var(--lime-ink);border-color:transparent}
  .btn.primary:hover{filter:brightness(1.06)}
  .btn.ghost{background:transparent;border-color:transparent;color:var(--dim)}
  .btn.ghost:hover{color:var(--text);background:var(--surface)}
  .btn.danger{color:var(--red);border-color:transparent;background:transparent}
  .btn.danger:hover{background:rgba(226,97,107,.12)}
  .btn.sm{padding:6px 11px;font-size:13px}
  .icon-btn{width:38px;height:38px;border-radius:10px;display:grid;place-items:center;
    background:var(--surface-2);border:1px solid var(--border);font-size:17px}
  .icon-btn:hover{background:var(--surface-3)}

  /* library */
  .wrap{width:100%;max-width:1180px;margin:0 auto;padding:26px 20px 80px;flex:1}
  .lib-head{display:flex;align-items:flex-end;gap:18px;flex-wrap:wrap;margin-bottom:26px}
  .lib-head h1{font-size:30px;font-weight:800;letter-spacing:-.03em}
  .lib-stats{display:flex;gap:22px;margin-left:auto;color:var(--dim);font-size:13px}
  .lib-stats b{display:block;color:var(--text);font-size:20px;font-weight:700;font-variant-numeric:tabular-nums}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(258px,1fr));gap:18px}
  .card{position:relative;background:var(--surface);border:1px solid var(--border);
    border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:.18s;display:flex;flex-direction:column}
  .card:hover{transform:translateY(-3px);border-color:var(--surface-3);box-shadow:var(--shadow)}
  .card .spine{height:5px;width:100%}
  .card-body{padding:18px 18px 16px;display:flex;flex-direction:column;gap:10px;flex:1}
  .card h3{font-size:17px;font-weight:700;letter-spacing:-.01em;line-height:1.25}
  .card .sub{color:var(--faint);font-size:12px;font-weight:500;margin-top:-4px}
  .card .logline{color:var(--dim);font-size:13px;line-height:1.5;
    display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;flex:1}
  .card-foot{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:2px}
  .tag{font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;
    background:var(--surface-2);color:var(--dim);border:1px solid var(--border)}
  .pill{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;letter-spacing:.01em}
  .progress{height:5px;border-radius:4px;background:var(--surface-2);overflow:hidden;margin-top:2px}
  .progress i{display:block;height:100%;background:var(--lime);border-radius:4px}
  .wc{color:var(--faint);font-size:12px;font-variant-numeric:tabular-nums;margin-top:2px}

  .new-card{border:1.5px dashed var(--border);background:transparent;display:grid;place-items:center;
    min-height:180px;color:var(--dim);font-weight:600;gap:6px;transition:.18s}
  .new-card:hover{border-color:var(--lime);color:var(--lime);background:rgba(224,165,59,.04)}
  .new-card .plus{font-size:30px;line-height:1}

  /* book view */
  .book-hero{padding:22px 0 18px;border-bottom:1px solid var(--border);margin-bottom:6px}
  .book-hero .bar{width:46px;height:6px;border-radius:6px;margin-bottom:14px}
  .book-hero h1{font-size:28px;font-weight:800;letter-spacing:-.03em}
  .book-hero .sub{color:var(--faint);font-size:13px;font-weight:500;margin-top:3px}
  .book-hero .meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-top:14px}
  .book-hero .logline{color:var(--dim);font-size:14px;margin-top:14px;max-width:680px;line-height:1.6}

  .tabs{display:flex;gap:4px;margin:22px 0 18px;border-bottom:1px solid var(--border)}
  .tab{padding:11px 16px;font-weight:600;font-size:14px;color:var(--dim);
    border-bottom:2px solid transparent;margin-bottom:-1px;transition:.15s}
  .tab:hover{color:var(--text)}
  .tab.active{color:var(--text);border-bottom-color:var(--lime)}
  .tabpane{display:none}
  .tabpane.active{display:block;animation:fade .25s ease}
  @keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

  /* chapter list */
  .ch-row{display:flex;align-items:center;gap:14px;padding:14px 16px;background:var(--surface);
    border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:9px;cursor:pointer;transition:.15s}
  .ch-row:hover{border-color:var(--surface-3);background:var(--surface-2)}
  .ch-num{width:30px;height:30px;border-radius:8px;background:var(--surface-2);display:grid;place-items:center;
    font-size:13px;font-weight:700;color:var(--dim);flex-shrink:0;font-variant-numeric:tabular-nums}
  .ch-main{flex:1;min-width:0}
  .ch-main .t{font-weight:600;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .ch-main .m{color:var(--faint);font-size:12px;margin-top:2px;font-variant-numeric:tabular-nums}
  .ch-moves{display:flex;flex-direction:column;gap:2px;flex-shrink:0}
  .ch-moves button{width:26px;height:18px;border-radius:5px;background:var(--surface-2);
    color:var(--dim);font-size:11px;display:grid;place-items:center;line-height:1}
  .ch-moves button:hover{background:var(--surface-3);color:var(--text)}
  .ch-moves button:disabled{opacity:.3;cursor:default}

  .empty{text-align:center;padding:54px 20px;color:var(--faint)}
  .empty p{margin-bottom:16px;font-size:14px}

  /* notes */
  .note-group{margin-bottom:26px}
  .note-group h4{font-size:13px;text-transform:uppercase;letter-spacing:.08em;color:var(--faint);
    font-weight:700;margin-bottom:11px;display:flex;align-items:center;gap:8px}
  .note-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px}
  .note{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);
    padding:14px 15px;cursor:pointer;transition:.15s}
  .note:hover{border-color:var(--surface-3);background:var(--surface-2)}
  .note .nt{font-weight:600;font-size:14px;margin-bottom:5px}
  .note .nb{color:var(--dim);font-size:13px;line-height:1.5;
    display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden}

  /* details form */
  .form{max-width:640px;display:flex;flex-direction:column;gap:18px}
  .field{display:flex;flex-direction:column;gap:7px}
  .field label{font-size:13px;font-weight:600;color:var(--dim)}
  .field input,.field textarea,.field select{
    background:var(--surface);border:1px solid var(--border);border-radius:10px;
    padding:11px 13px;font-size:14px;width:100%;transition:.15s}
  .field input:focus,.field textarea:focus,.field select:focus{outline:none;border-color:var(--lime)}
  .field textarea{resize:vertical;min-height:88px;line-height:1.6}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .swatches{display:flex;gap:9px;flex-wrap:wrap}
  .sw{width:32px;height:32px;border-radius:9px;cursor:pointer;border:2px solid transparent;transition:.12s}
  .sw.active{border-color:var(--text);transform:scale(1.08)}
  .form-actions{display:flex;gap:10px;align-items:center;padding-top:6px}

  /* editor */
  #editor{background:var(--paper)}
  .ed-bar{position:sticky;top:0;z-index:20;display:flex;align-items:center;gap:12px;
    padding:12px 18px;background:rgba(250,248,242,.9);backdrop-filter:blur(10px);
    border-bottom:1px solid #e7e2d6;padding-top:max(12px,env(safe-area-inset-top))}
  .ed-bar .icon-btn{background:#efe9db;border-color:#e2dccd;color:#5b5648}
  .ed-bar .icon-btn:hover{background:#e6dfcd}
  .ed-status{font-size:12px;color:#8a8472;font-weight:600;display:flex;align-items:center;gap:6px;min-width:64px}
  .ed-status .ring{width:8px;height:8px;border-radius:50%;background:var(--green)}
  .ed-status.saving .ring{background:var(--amber);animation:pulse 1s infinite}
  @keyframes pulse{50%{opacity:.3}}
  .ed-sel{background:#efe9db;border:1px solid #e2dccd;border-radius:8px;padding:7px 10px;
    font-size:13px;font-weight:600;color:#3a3528}
  .ed-count{margin-left:auto;font-size:12px;color:#8a8472;font-weight:600;font-variant-numeric:tabular-nums}

  .ed-wrap{flex:1;display:flex;justify-content:center;padding:40px 24px 120px}
  .ed-inner{width:100%;max-width:720px}
  .ed-title{width:100%;border:none;background:transparent;color:var(--ink);
    font-family:'Newsreader',serif;font-size:34px;font-weight:500;letter-spacing:-.02em;margin-bottom:8px}
  .ed-title:focus{outline:none}
  .ed-title::placeholder{color:#cfc8b6}
  .ed-body{width:100%;border:none;background:transparent;color:var(--ink);resize:none;
    font-family:'Newsreader',serif;font-size:19px;line-height:1.85;min-height:60vh}
  .ed-body:focus{outline:none}
  .ed-body::placeholder{color:#cfc8b6}
  #editor.focusmode .ed-bar{opacity:.18;transition:.3s}
  #editor.focusmode .ed-bar:hover{opacity:1}

  /* modal */
  .overlay{position:fixed;inset:0;background:rgba(8,12,22,.6);backdrop-filter:blur(3px);
    display:none;align-items:center;justify-content:center;z-index:50;padding:20px}
  .overlay.show{display:flex}
  .modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
    width:100%;max-width:480px;padding:22px;box-shadow:var(--shadow)}
  .modal h3{font-size:18px;font-weight:700;margin-bottom:16px}
  .modal .form{gap:14px}

  /* toast */
  #toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);
    background:var(--surface-3);color:var(--text);padding:11px 18px;border-radius:10px;
    font-size:14px;font-weight:600;box-shadow:var(--shadow);opacity:0;pointer-events:none;
    transition:.25s;z-index:80;border:1px solid var(--border)}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  .loading{display:grid;place-items:center;min-height:60vh;color:var(--dim);font-size:14px}

  @media(max-width:560px){
    .wrap{padding:20px 15px 70px}
    .lib-head h1{font-size:24px}
    .lib-stats{width:100%;margin-left:0}
    .row2{grid-template-columns:1fr}
    .ed-wrap{padding:28px 18px 120px}
    .ed-title{font-size:27px}
    .ed-body{font-size:18px}
  }
</style>
</head>
<body>

<!-- LIBRARY -->
<div id="library" class="screen active">
  <div class="topbar">
    <div class="brand"><span class="dot"></span> Manuscripts <small>Shane&nbsp;J.&nbsp;Cox</small></div>
    <div class="spacer"></div>
    <button class="btn primary" onclick="newBook()">+ New Book</button>
  </div>
  <div class="wrap">
    <div class="lib-head">
      <h1>The Library</h1>
      <div class="lib-stats">
        <div><b id="stat-books">—</b>books</div>
        <div><b id="stat-words">—</b>words written</div>
      </div>
    </div>
    <div id="lib-grid" class="grid">
      <div class="loading">Loading your shelf…</div>
    </div>
  </div>
</div>

<!-- BOOK VIEW -->
<div id="book" class="screen">
  <div class="topbar">
    <button class="icon-btn" onclick="loadLibrary()">←</button>
    <div class="brand" style="font-size:15px"><span class="dot"></span> Manuscripts</div>
    <div class="spacer"></div>
    <button class="btn sm" onclick="newChapter()">+ Chapter</button>
  </div>
  <div class="wrap">
    <div class="book-hero">
      <div class="bar" id="bk-bar"></div>
      <h1 id="bk-title">—</h1>
      <div class="sub" id="bk-sub"></div>
      <div class="meta" id="bk-meta"></div>
      <div class="logline" id="bk-logline"></div>
    </div>
    <div class="tabs">
      <button class="tab active" data-tab="chapters" onclick="switchTab('chapters')">Chapters</button>
      <button class="tab" data-tab="notes" onclick="switchTab('notes')">Notes</button>
      <button class="tab" data-tab="details" onclick="switchTab('details')">Details</button>
    </div>
    <div class="tabpane active" id="pane-chapters"></div>
    <div class="tabpane" id="pane-notes"></div>
    <div class="tabpane" id="pane-details"></div>
  </div>
</div>

<!-- EDITOR -->
<div id="editor" class="screen">
  <div class="ed-bar">
    <button class="icon-btn" onclick="closeEditor()">←</button>
    <div class="ed-status" id="ed-status"><span class="ring"></span><span id="ed-status-txt">Saved</span></div>
    <select class="ed-sel" id="ed-status-sel" onchange="onStatusChange()">
      <option value="Outline">Outline</option>
      <option value="Draft">Draft</option>
      <option value="Revised">Revised</option>
      <option value="Done">Done</option>
    </select>
    <button class="icon-btn" onclick="toggleFocus()" title="Focus mode">◐</button>
    <button class="icon-btn" onclick="deleteChapter()" title="Delete chapter" style="color:var(--red)">🗑</button>
    <div class="ed-count"><span id="ed-count">0</span> words</div>
  </div>
  <div class="ed-wrap">
    <div class="ed-inner">
      <input class="ed-title" id="ed-title" placeholder="Chapter title…" oninput="queueSave()">
      <textarea class="ed-body" id="ed-body" placeholder="Begin writing…" oninput="onBodyInput()"></textarea>
    </div>
  </div>
</div>

<!-- NOTE MODAL -->
<div class="overlay" id="note-overlay">
  <div class="modal">
    <h3 id="note-modal-title">New Note</h3>
    <div class="form">
      <div class="field">
        <label>Category</label>
        <select id="note-cat">
          <option>Character</option><option>World</option><option>Plot</option>
          <option>Research</option><option>Misc</option>
        </select>
      </div>
      <div class="field"><label>Title</label><input id="note-title" placeholder="e.g. Dr. Mara Solberg"></div>
      <div class="field"><label>Content</label><textarea id="note-body" placeholder="Details…" style="min-height:140px"></textarea></div>
      <div class="form-actions">
        <button class="btn primary" onclick="saveNote()">Save</button>
        <button class="btn ghost" onclick="closeNoteModal()">Cancel</button>
        <div class="spacer" style="flex:1"></div>
        <button class="btn danger" id="note-del" onclick="deleteNote()" style="display:none">Delete</button>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
/* ---------- config ---------- */
const SUPABASE_URL = 'https://sbajswwuykvjhtoehfps.supabase.co';
const SUPABASE_KEY = 'sb_publishable_uP40lclXeaMzJ__zFQESHQ__XSLqJgK';
const ACCENTS = ['#C5E86C','#6FA8DC','#D9883B','#5FB3A1','#9B8CE0','#C0566B','#E08AB0','#E8A87C','#7FC77F','#E2616B'];
const CH_STATUS = {Outline:'#94a3b8',Draft:'#f0b84a',Revised:'#6fa8dc',Done:'#7fc77f'};
const BK_STATUS = {Planning:'#94a3b8',Drafting:'#f0b84a',Revising:'#6fa8dc',Done:'#7fc77f'};

/* ---------- state ---------- */
let supa = null;
let books = [];
let currentBook = null;
let chapters = [];
let notes = [];
let currentChapter = null;
let saveTimer = null;
let activeTab = 'chapters';
let editingNoteId = null;

/* ---------- screen switch (global, hoisted, NOT in IIFE) ---------- */
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

/* ---------- helpers ---------- */
function wordCount(t){ if(!t) return 0; const m=t.trim().match(/\S+/g); return m?m.length:0; }
function fmt(n){ return (n||0).toLocaleString('en-US'); }
function esc(s){ return (s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function toast(msg){
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(t._h); t._h=setTimeout(()=>t.classList.remove('show'),1800);
}
function pill(text,color){
  return `<span class="pill" style="background:${color}22;color:${color}">${esc(text)}</span>`;
}

/* ---------- init ---------- */
async function init(){
  supa = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, { auth: { persistSession:false, autoRefreshToken:false } });
  await loadLibrary();
}

/* ---------- library ---------- */
async function loadLibrary(){
  showScreen('library');
  const {data:bk,error} = await supa.from('books').select('*').order('sort_order',{ascending:true});
  if(error){ document.getElementById('lib-grid').innerHTML=`<div class="empty"><p>Couldn't load books.<br>${esc(error.message)}</p></div>`; return; }
  books = bk||[];
  // pull word totals per book
  const {data:ch} = await supa.from('chapters').select('book_id,word_count');
  const totals={}; (ch||[]).forEach(c=>{ totals[c.book_id]=(totals[c.book_id]||0)+(c.word_count||0); });
  let grand=0; Object.values(totals).forEach(v=>grand+=v);
  document.getElementById('stat-books').textContent = books.length;
  document.getElementById('stat-words').textContent = fmt(grand);
  renderLibrary(totals);
}

function renderLibrary(totals){
  const grid = document.getElementById('lib-grid');
  let html='';
  books.forEach(b=>{
    const wc = totals[b.id]||0;
    const pct = b.target_words>0 ? Math.min(100,Math.round(wc/b.target_words*100)) : 0;
    html += `
      <div class="card" onclick="openBook('${b.id}')">
        <div class="spine" style="background:${b.color||'#C5E86C'}"></div>
        <div class="card-body">
          <div>
            <h3>${esc(b.title)}</h3>
            ${b.subtitle?`<div class="sub">${esc(b.subtitle)}</div>`:''}
          </div>
          <div class="logline">${esc(b.logline||'No logline yet.')}</div>
          <div class="card-foot">
            ${b.genre?`<span class="tag">${esc(b.genre)}</span>`:''}
            ${pill(b.status||'Planning', BK_STATUS[b.status]||'#94a3b8')}
          </div>
          ${b.target_words>0?`<div class="progress"><i style="width:${pct}%;background:${b.color||'#C5E86C'}"></i></div>`:''}
          <div class="wc">${fmt(wc)} words${b.target_words>0?` · ${pct}% of ${fmt(b.target_words)}`:''}</div>
        </div>
      </div>`;
  });
  html += `<div class="card new-card" onclick="newBook()"><div class="plus">+</div>New Book</div>`;
  grid.innerHTML = html;
}

/* ---------- book CRUD ---------- */
async function newBook(){
  const {data,error} = await supa.from('books').insert({
    title:'Untitled Book', status:'Planning', color:ACCENTS[books.length%ACCENTS.length],
    sort_order:(books.length+1), target_words:0
  }).select().single();
  if(error){ toast('Error creating book'); return; }
  await openBook(data.id);
  switchTab('details');
}

async function openBook(id){
  currentBook = books.find(b=>b.id===id);
  if(!currentBook){ const {data}=await supa.from('books').select('*').eq('id',id).single(); currentBook=data; }
  const [{data:ch},{data:nt}] = await Promise.all([
    supa.from('chapters').select('*').eq('book_id',id).order('sort_order',{ascending:true}),
    supa.from('notes').select('*').eq('book_id',id).order('sort_order',{ascending:true})
  ]);
  chapters = ch||[]; notes = nt||[];
  renderBookHero(); switchTab('chapters'); showScreen('book');
}

function renderBookHero(){
  const b=currentBook;
  const total = chapters.reduce((s,c)=>s+(c.word_count||0),0);
  document.getElementById('bk-bar').style.background = b.color||'#C5E86C';
  document.getElementById('bk-title').textContent = b.title;
  document.getElementById('bk-sub').textContent = b.subtitle||'';
  document.getElementById('bk-sub').style.display = b.subtitle?'block':'none';
  document.getElementById('bk-logline').textContent = b.logline||'';
  document.getElementById('bk-meta').innerHTML =
    (b.genre?`<span class="tag">${esc(b.genre)}</span>`:'') +
    pill(b.status||'Planning', BK_STATUS[b.status]||'#94a3b8') +
    `<span class="tag">${chapters.length} chapter${chapters.length===1?'':'s'}</span>` +
    `<span class="tag">${fmt(total)} words${b.target_words>0?` / ${fmt(b.target_words)}`:''}</span>`;
}

/* ---------- tabs ---------- */
function switchTab(tab){
  activeTab = tab;
  document.querySelectorAll('#book .tab').forEach(t=>t.classList.toggle('active',t.dataset.tab===tab));
  document.querySelectorAll('#book .tabpane').forEach(p=>p.classList.remove('active'));
  document.getElementById('pane-'+tab).classList.add('active');
  if(tab==='chapters') renderChapters();
  if(tab==='notes') renderNotes();
  if(tab==='details') renderDetails();
}

/* ---------- chapters ---------- */
function renderChapters(){
  const pane=document.getElementById('pane-chapters');
  if(!chapters.length){
    pane.innerHTML=`<div class="empty"><p>No chapters yet.</p><button class="btn primary" onclick="newChapter()">+ Add first chapter</button></div>`;
    return;
  }
  let html='';
  chapters.forEach((c,i)=>{
    const col = CH_STATUS[c.status]||'#94a3b8';
    html+=`
      <div class="ch-row" onclick="openChapter('${c.id}')">
        <div class="ch-num">${i+1}</div>
        <div class="ch-main">
          <div class="t">${esc(c.title||'Untitled')}</div>
          <div class="m">${fmt(c.word_count||0)} words · <span style="color:${col}">${esc(c.status||'Outline')}</span></div>
        </div>
        <div class="ch-moves" onclick="event.stopPropagation()">
          <button onclick="moveChapter(${i},-1)" ${i===0?'disabled':''}>▲</button>
          <button onclick="moveChapter(${i},1)" ${i===chapters.length-1?'disabled':''}>▼</button>
        </div>
      </div>`;
  });
  pane.innerHTML=html;
}

async function newChapter(){
  if(!currentBook) return;
  const {data,error}=await supa.from('chapters').insert({
    book_id:currentBook.id, title:'Chapter '+(chapters.length+1),
    content:'', status:'Outline', word_count:0, sort_order:chapters.length+1
  }).select().single();
  if(error){ toast('Error'); return; }
  chapters.push(data); renderBookHero();
  openChapter(data.id);
}

async function moveChapter(i,dir){
  const j=i+dir; if(j<0||j>=chapters.length) return;
  [chapters[i],chapters[j]]=[chapters[j],chapters[i]];
  renderChapters();
  await Promise.all(chapters.map((c,idx)=>{
    c.sort_order=idx+1;
    return supa.from('chapters').update({sort_order:idx+1}).eq('id',c.id);
  }));
}

/* ---------- editor ---------- */
function openChapter(id){
  currentChapter = chapters.find(c=>c.id===id);
  if(!currentChapter) return;
  document.getElementById('ed-title').value = currentChapter.title||'';
  document.getElementById('ed-body').value = currentChapter.content||'';
  document.getElementById('ed-status-sel').value = currentChapter.status||'Outline';
  updateCount();
  setSaved(true);
  document.getElementById('editor').classList.remove('focusmode');
  showScreen('editor');
  setTimeout(()=>document.getElementById('ed-body').focus(),100);
}

function onBodyInput(){ updateCount(); queueSave(); }
function updateCount(){
  document.getElementById('ed-count').textContent = fmt(wordCount(document.getElementById('ed-body').value));
}
function onStatusChange(){ queueSave(); }
function toggleFocus(){ document.getElementById('editor').classList.toggle('focusmode'); }

function setSaved(saved){
  const s=document.getElementById('ed-status');
  document.getElementById('ed-status-txt').textContent = saved?'Saved':'Saving…';
  s.classList.toggle('saving',!saved);
}

function queueSave(){
  setSaved(false);
  clearTimeout(saveTimer);
  saveTimer=setTimeout(saveChapter,1100);
}

async function saveChapter(){
  if(!currentChapter) return;
  const title=document.getElementById('ed-title').value;
  const content=document.getElementById('ed-body').value;
  const status=document.getElementById('ed-status-sel').value;
  const wc=wordCount(content);
  const {error}=await supa.from('chapters').update({
    title,content,status,word_count:wc,updated_at:new Date().toISOString()
  }).eq('id',currentChapter.id);
  if(error){ setSaved(false); toast('Save failed — check connection'); return; }
  Object.assign(currentChapter,{title,content,status,word_count:wc});
  setSaved(true);
}

async function closeEditor(){
  clearTimeout(saveTimer);
  await saveChapter();
  renderBookHero(); renderChapters();
  showScreen('book');
}

async function deleteChapter(){
  if(!currentChapter) return;
  if(!confirm('Delete this chapter? This cannot be undone.')) return;
  await supa.from('chapters').delete().eq('id',currentChapter.id);
  chapters=chapters.filter(c=>c.id!==currentChapter.id);
  currentChapter=null;
  renderBookHero(); renderChapters(); showScreen('book');
  toast('Chapter deleted');
}

/* ---------- notes ---------- */
function renderNotes(){
  const pane=document.getElementById('pane-notes');
  const cats=['Character','World','Plot','Research','Misc'];
  let html=`<div style="margin-bottom:18px"><button class="btn primary sm" onclick="openNoteModal()">+ New Note</button></div>`;
  if(!notes.length){
    html+=`<div class="empty"><p>No notes yet — characters, worldbuilding, plot threads, research.</p></div>`;
    pane.innerHTML=html; return;
  }
  cats.forEach(cat=>{
    const list=notes.filter(n=>n.category===cat);
    if(!list.length) return;
    html+=`<div class="note-group"><h4>${cat} <span style="color:var(--faint);font-weight:600">${list.length}</span></h4><div class="note-grid">`;
    list.forEach(n=>{
      html+=`<div class="note" onclick="openNoteModal('${n.id}')">
        <div class="nt">${esc(n.title||'Untitled')}</div>
        <div class="nb">${esc(n.content||'')}</div></div>`;
    });
    html+=`</div></div>`;
  });
  pane.innerHTML=html;
}

function openNoteModal(id){
  editingNoteId=id||null;
  const n = id? notes.find(x=>x.id===id) : null;
  document.getElementById('note-modal-title').textContent = n?'Edit Note':'New Note';
  document.getElementById('note-cat').value = n?n.category:'Character';
  document.getElementById('note-title').value = n?n.title||'':'';
  document.getElementById('note-body').value = n?n.content||'':'';
  document.getElementById('note-del').style.display = n?'inline-flex':'none';
  document.getElementById('note-overlay').classList.add('show');
}
function closeNoteModal(){ document.getElementById('note-overlay').classList.remove('show'); }

async function saveNote(){
  const payload={
    category:document.getElementById('note-cat').value,
    title:document.getElementById('note-title').value||'Untitled',
    content:document.getElementById('note-body').value
  };
  if(editingNoteId){
    await supa.from('notes').update(payload).eq('id',editingNoteId);
    Object.assign(notes.find(n=>n.id===editingNoteId),payload);
  }else{
    payload.book_id=currentBook.id; payload.sort_order=notes.length+1;
    const {data}=await supa.from('notes').insert(payload).select().single();
    notes.push(data);
  }
  closeNoteModal(); renderNotes(); toast('Note saved');
}

async function deleteNote(){
  if(!editingNoteId) return;
  if(!confirm('Delete this note?')) return;
  await supa.from('notes').delete().eq('id',editingNoteId);
  notes=notes.filter(n=>n.id!==editingNoteId);
  closeNoteModal(); renderNotes(); toast('Note deleted');
}

/* ---------- details ---------- */
function renderDetails(){
  const b=currentBook;
  const pane=document.getElementById('pane-details');
  pane.innerHTML=`
    <div class="form">
      <div class="field"><label>Title</label><input id="d-title" value="${esc(b.title)}"></div>
      <div class="field"><label>Subtitle / Series</label><input id="d-sub" value="${esc(b.subtitle||'')}" placeholder="optional"></div>
      <div class="row2">
        <div class="field"><label>Genre</label><input id="d-genre" value="${esc(b.genre||'')}" placeholder="e.g. Psychological Thriller"></div>
        <div class="field"><label>Status</label><select id="d-status">
          ${Object.keys(BK_STATUS).map(s=>`<option ${b.status===s?'selected':''}>${s}</option>`).join('')}
        </select></div>
      </div>
      <div class="field"><label>Logline</label><textarea id="d-logline" placeholder="One-sentence pitch">${esc(b.logline||'')}</textarea></div>
      <div class="field"><label>Target word count</label><input id="d-target" type="number" value="${b.target_words||0}"></div>
      <div class="field"><label>Cover accent</label><div class="swatches" id="d-swatches">
        ${ACCENTS.map(c=>`<div class="sw ${b.color===c?'active':''}" style="background:${c}" data-c="${c}" onclick="pickColor('${c}')"></div>`).join('')}
      </div></div>
      <div class="form-actions">
        <button class="btn primary" onclick="saveDetails()">Save Changes</button>
        <div style="flex:1"></div>
        <button class="btn danger" onclick="deleteBook()">Delete Book</button>
      </div>
    </div>`;
}
let pickedColor=null;
function pickColor(c){
  pickedColor=c;
  document.querySelectorAll('#d-swatches .sw').forEach(s=>s.classList.toggle('active',s.dataset.c===c));
}
async function saveDetails(){
  const payload={
    title:document.getElementById('d-title').value||'Untitled Book',
    subtitle:document.getElementById('d-sub').value,
    genre:document.getElementById('d-genre').value,
    status:document.getElementById('d-status').value,
    logline:document.getElementById('d-logline').value,
    target_words:parseInt(document.getElementById('d-target').value)||0,
    color:pickedColor||currentBook.color,
    updated_at:new Date().toISOString()
  };
  const {error}=await supa.from('books').update(payload).eq('id',currentBook.id);
  if(error){ toast('Save failed'); return; }
  Object.assign(currentBook,payload);
  const idx=books.findIndex(b=>b.id===currentBook.id); if(idx>=0) Object.assign(books[idx],payload);
  pickedColor=null; renderBookHero(); toast('Saved');
}
async function deleteBook(){
  if(!confirm('Delete "'+currentBook.title+'" and all its chapters & notes? This cannot be undone.')) return;
  await supa.from('books').delete().eq('id',currentBook.id);
  toast('Book deleted'); loadLibrary();
}

/* close modal on backdrop click */
document.getElementById('note-overlay').addEventListener('click',e=>{
  if(e.target.id==='note-overlay') closeNoteModal();
});

init();
</script>
</body>
</html>
